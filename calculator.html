<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS 사칙연산 계산기 v2</title>
    <link rel="stylesheet" href="calculator_style.css">
    <script src="calculator.js" defer></script>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly value="0" aria-label="계산기 화면">
        <div class="buttons">
            <button class="on-off" type="button" data-type="power">ON/OFF</button>
            <button class="clear" type="button" data-type="clear">C</button>
            <button class="operator" type="button" data-type="operator" data-value="/">/</button>

            <button class="number" type="button" data-type="number" data-value="7">7</button>
            <button class="number" type="button" data-type="number" data-value="8">8</button>
            <button class="number" type="button" data-type="number" data-value="9">9</button>
            <button class="operator" type="button" data-type="operator" data-value="*">*</button>

            <button class="number" type="button" data-type="number" data-value="4">4</button>
            <button class="number" type="button" data-type="number" data-value="5">5</button>
            <button class="number" type="button" data-type="number" data-value="6">6</button>
            <button class="operator" type="button" data-type="operator" data-value="-">-</button>

            <button class="number" type="button" data-type="number" data-value="1">1</button>
            <button class="number" type="button" data-type="number" data-value="2">2</button>
            <button class="number" type="button" data-type="number" data-value="3">3</button>
            <button class="operator" type="button" data-type="operator" data-value="+">+</button>

            <button class="number" type="button" data-type="number" data-value=".">.</button>
            <button class="number" type="button" data-type="number" data-value="0">0</button>
            <button class="enter" type="button" data-type="calculate">Enter</button>
        </div>
    </div>
</body>
</html>
